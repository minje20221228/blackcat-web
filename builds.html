    }
  </script>
</head>
<body data-page="builds">
  <div class="app-shell">
    <header class="hero">
      <div class="hero-copy">
        <a class="brand-home" href="/index.html" aria-label="Slay the Spire 2">Slay the Spire 2</a>
      </div>
      <div class="hero-controls">
        <nav class="view-nav" id="view-nav" aria-label="Primary navigation">
          <a class="nav-button nav-link" id="nav-character" href="/characters.html"></a>
          <a class="nav-button nav-link" id="nav-cards" href="/cards.html"></a>
          <a class="nav-button nav-link" id="nav-relics" href="/relics.html"></a>
          <a class="nav-button nav-link" id="nav-potions" href="/potions.html"></a>
          <a class="nav-button nav-link" id="nav-builds" href="/builds.html"></a>
          <div class="utility-menu">
            <button class="nav-button utility-button" id="language-button" type="button" aria-haspopup="true" aria-expanded="false" aria-controls="language-menu"></button>
            <div class="floating-menu" id="language-menu" hidden></div>
          </div>
          <div class="utility-menu help-menu">
            <button class="nav-button help-button" id="site-menu-button" type="button" aria-haspopup="true" aria-expanded="false" aria-controls="site-menu" aria-label="Help" title="Help">?</button>
            <div class="floating-menu site-menu" id="site-menu" hidden>
              <a class="menu-link" href="/privacy" data-copy-en="Privacy Policy" data-copy-ko="개인정보처리방침" data-href-en="/privacy" data-href-ko="/privacy-ko">Privacy Policy</a>
              <a class="menu-link" href="/contact" data-copy-en="Contact" data-copy-ko="문의" data-href-en="/contact" data-href-ko="/contact-ko">Contact</a>
            </div>
          </div>
        </nav>
      </div>
    </header>

    <main class="layout">
      <aside class="sidebar panel" id="characters-section">
        <div class="panel-head">
          <div>
            <p class="section-kicker" id="character-kicker"></p>
            <h2 id="character-heading"></h2>
          </div>
        </div>
        <div class="character-tabs" id="character-tabs" aria-label="Character selection"></div>
        <div class="character-summary" id="character-summary"></div>
      </aside>

      <section class="content">
        <section class="panel content-panel patch-panel" id="patch-panel">
          <div class="workspace-head">
            <div>
              <p class="section-kicker" id="patch-kicker"></p>
              <h2 id="patch-heading"></h2>
            </div>
          </div>
          <div class="patch-meta" id="patch-meta"></div>
          <div class="patch-list" id="patch-list"></div>
        </section>

        <section class="panel content-panel character-detail-panel" id="character-detail-panel" hidden>
          <div class="workspace-head">
            <div>
              <p class="section-kicker" id="character-detail-kicker">Character Overview</p>
              <h2 id="character-detail-heading"></h2>
            </div>
          </div>
          <div class="character-detail-grid">
            <div class="character-detail-copy">
              <p class="section-note" id="character-detail-body"></p>
              <ul class="character-highlight-list" id="character-highlight-list"></ul>
            </div>
            <div class="character-detail-visual">
              <img id="character-detail-image" class="character-detail-image" alt="" loading="lazy">
            </div>
          </div>
        </section>

        <section class="panel content-panel" id="cards-panel" data-panel="cards">
          <div class="workspace-head">
            <div>
              <p class="section-kicker" id="library-kicker"></p>
              <h2 id="library-heading"></h2>
            </div>
            <div class="workspace-actions" id="library-actions">
              <label class="control control-compact" for="browse-character-select">
                <span id="browse-character-label"></span>
                <select id="browse-character-select" class="text-input"></select>
              </label>
            </div>
          </div>
          <div class="filter-grid">
            <label class="field-group field-group-wide" for="card-search-input">
              <span class="field-label" id="field-search-label"></span>
              <input id="card-search-input" class="text-input" type="search" maxlength="80">
            </label>
            <label class="field-group" for="type-filter-select">
              <span class="field-label" id="field-type-label"></span>
              <select id="type-filter-select" class="text-input"></select>
            </label>
            <label class="field-group" for="rarity-filter-select">
              <span class="field-label" id="field-rarity-label"></span>
              <select id="rarity-filter-select" class="text-input"></select>
            </label>
            <label class="field-group" for="cost-filter-select">
              <span class="field-label" id="field-cost-label"></span>
              <select id="cost-filter-select" class="text-input"></select>
            </label>
            <label class="field-group" for="library-sort-select">
              <span class="field-label" id="field-library-sort-label"></span>
              <select id="library-sort-select" class="text-input"></select>
            </label>
          </div>
          <div class="library-list" id="library-list"></div>
        </section>

        <section class="panel content-panel" id="relics-panel" data-panel="relics" hidden>
          <div class="workspace-head">
            <div>
              <p class="section-kicker" id="relics-kicker"></p>
              <h2 id="relics-heading"></h2>
            </div>
          </div>
          <div class="relics-grid" id="relics-grid"></div>
        </section>

        <section class="panel content-panel" id="potions-panel" data-panel="potions" hidden>
          <div class="workspace-head">
            <div>
              <p class="section-kicker" id="potions-kicker"></p>
              <h2 id="potions-heading"></h2>
            </div>
          </div>
          <div class="relics-grid" id="potions-grid"></div>
        </section>

        <section class="panel content-panel" id="builds-panel" data-panel="builds" hidden>
          <div class="workspace-head">
            <div>
              <p class="section-kicker" id="buildlist-kicker"></p>
              <h2 id="buildlist-heading"></h2>
            </div>
            <div class="workspace-actions">
              <div class="action-row">
                <label class="control control-compact" for="builds-character-select">
                  <span id="builds-character-label"></span>
                  <select id="builds-character-select">
                  </select>
                </label>
                <label class="control control-compact" for="sort-select">
                  <span id="sort-label"></span>
                  <select id="sort-select">
                    <option value="latest">Latest</option>
                    <option value="popular">Pinned</option>
                  </select>
                </label>
                <input id="build-search-input" class="text-input build-search-input" type="search" maxlength="80">
                <button class="action-button action-button-primary" id="new-build-button" type="button"></button>
              </div>
              <p class="status-text" id="build-status" role="status" aria-live="polite"></p>
            </div>
          </div>
          <div class="build-list" id="build-list"></div>

          <div class="panel builder-panel" id="builder-panel" hidden>
            <div class="workspace-head">
              <div>
                <p class="section-kicker" id="builder-kicker"></p>
                <h2 id="builder-heading"></h2>
              </div>
              <div class="workspace-actions">
                <div class="action-row">
                  <button class="action-button" id="duplicate-build-button" type="button"></button>
                  <button class="action-button action-button-primary" id="save-build-button" type="button"></button>
                  <button class="action-button action-button-danger" id="delete-build-button" type="button"></button>
                </div>
              </div>
            </div>

            <div class="builder-grid">
              <section class="detail-block editor-block">
                <div class="panel-head">
                  <div>
                    <p class="section-kicker" id="editor-kicker"></p>
                    <h3 id="editor-heading"></h3>
                  </div>
                </div>

                <div class="form-grid">
                  <label class="field-group field-group-wide" for="build-title-input">
                    <span class="field-label" id="field-title-label"></span>
                    <input id="build-title-input" class="text-input" type="text" maxlength="80">
                  </label>
                  <label class="field-group" for="build-author-input">
                    <span class="field-label" id="field-author-label"></span>
                    <input id="build-author-input" class="text-input" type="text" maxlength="40">
                  </label>
                  <label class="field-group" for="build-character-select">
                    <span class="field-label" id="field-character-label"></span>
                    <select id="build-character-select" class="text-input"></select>
                  </label>
                  <label class="field-group field-group-wide" for="build-summary-input">
                    <span class="field-label" id="field-summary-label"></span>
                    <textarea id="build-summary-input" class="text-area" rows="3" maxlength="220"></textarea>
                  </label>
                  <label class="field-group field-group-wide" for="build-notes-input">
                    <span class="field-label" id="field-notes-label"></span>
                    <textarea id="build-notes-input" class="text-area" rows="4" maxlength="420"></textarea>
                  </label>
                </div>

                <div class="selected-cards" id="selected-cards"></div>
              </section>

              <section class="detail-block picker-block">
                <div class="panel-head">
                  <div>
                    <p class="section-kicker" id="picker-kicker"></p>
                    <h3 id="picker-heading"></h3>
                  </div>
                </div>
                <p class="section-note" id="picker-note"></p>
                <div class="filter-grid editor-filter-grid">
                  <label class="field-group field-group-wide" for="editor-card-search-input">
                    <span class="field-label" id="editor-field-search-label"></span>
                    <input id="editor-card-search-input" class="text-input" type="search" maxlength="80">
                  </label>
                  <label class="field-group" for="editor-type-filter-select">
                    <span class="field-label" id="editor-field-type-label"></span>
                    <select id="editor-type-filter-select" class="text-input"></select>
                  </label>
                  <label class="field-group" for="editor-rarity-filter-select">
                    <span class="field-label" id="editor-field-rarity-label"></span>
                    <select id="editor-rarity-filter-select" class="text-input"></select>
                  </label>
                  <label class="field-group" for="editor-cost-filter-select">
                    <span class="field-label" id="editor-field-cost-label"></span>
                    <select id="editor-cost-filter-select" class="text-input"></select>
                  </label>
                  <label class="field-group" for="editor-library-sort-select">
                    <span class="field-label" id="editor-field-library-sort-label"></span>
                    <select id="editor-library-sort-select" class="text-input"></select>
                  </label>
                </div>
                <div class="editor-library-list" id="editor-library-list"></div>
              </section>
            </div>
          </div>
        </section>
      </section>
    </main>

    <footer class="site-footer panel">
      <div>
        <p class="section-kicker">Slay the Spire 2</p>
      </div>
      <nav class="footer-nav" aria-label="Footer navigation">
        <a class="text-link" href="/privacy" data-copy-en="Privacy" data-copy-ko="개인정보처리방침" data-href-en="/privacy" data-href-ko="/privacy-ko">Privacy</a>
        <a class="text-link" href="/contact" data-copy-en="Contact" data-copy-ko="문의" data-href-en="/contact" data-href-ko="/contact-ko">Contact</a>
      </nav>
    </footer>
  </div>

  <script src="cards-data.js"></script>
  <script src="ironclad-localization.js"></script>
  <script src="silent-localization.js"></script>
  <script src="regent-localization.js"></script>
  <script src="necrobinder-localization.js"></script>
  <script src="defect-localization.js"></script>
  <script src="relics-data.js"></script>
  <script src="patch-notes-data.js?v=steam-only-drag"></script>
  <script src="potions-data.js"></script>
  <script src="main.js"></script>
</body>
</html>
