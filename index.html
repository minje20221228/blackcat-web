<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slay the Spire 2 Decklists</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-shell">
    <header class="hero" id="top">
      <div class="hero-copy">
        <div class="hero-topbar">
          <p class="eyebrow" id="hero-eyebrow">Slay the Spire 2</p>
          <label class="language-switcher" for="language-select">
            <span class="language-label" id="language-label">Language</span>
            <select id="language-select">
              <option value="en">English</option>
              <option value="ko">한국어</option>
              <option value="ja">日本語</option>
              <option value="es">Español</option>
            </select>
          </label>
        </div>
        <h1 id="hero-title">Decklist Archive</h1>
        <p class="hero-text" id="hero-text"></p>
        <div class="hero-actions">
          <a class="hero-link" href="#character-nav" id="hero-action-primary"></a>
          <a class="hero-link hero-link-secondary" href="#deck-section" id="hero-action-secondary"></a>
        </div>
      </div>
      <aside class="hero-panel">
        <p class="panel-label" id="panel-label"></p>
        <ul class="hero-points" id="hero-points"></ul>
        <p class="panel-note" id="panel-note"></p>
      </aside>
    </header>

    <main>
      <section class="character-nav" id="character-nav" aria-label="Character selection"></section>

      <section class="character-summary" id="character-summary">
        <div class="summary-copy">
          <p class="section-kicker" id="summary-kicker"></p>
          <h2 id="summary-name"></h2>
          <p id="summary-description"></p>
        </div>
        <div class="summary-stats" id="summary-stats"></div>
      </section>

      <section class="deck-toolbar" id="deck-section">
        <div>
          <p class="section-kicker" id="decklist-kicker"></p>
          <h2 id="deck-section-title"></h2>
          <p class="section-note" id="deck-section-note"></p>
        </div>
        <div class="deck-switcher" id="deck-switcher" aria-label="Deck selection"></div>
      </section>

      <section class="deck-overview" id="deck-overview">
        <div class="deck-intro">
          <p class="section-kicker" id="deck-plan-kicker"></p>
          <h2 id="deck-name"></h2>
          <p class="deck-subtitle" id="deck-subtitle"></p>
          <p class="deck-plan" id="deck-plan"></p>
        </div>
        <div class="deck-metrics" id="deck-metrics"></div>
      </section>

      <section class="content-grid">
        <article class="panel-block">
          <div class="panel-head">
            <p class="section-kicker" id="core-kicker"></p>
            <h3 id="core-heading"></h3>
          </div>
          <div class="card-list" id="core-cards"></div>
        </article>

        <article class="panel-block">
          <div class="panel-head">
            <p class="section-kicker" id="support-kicker"></p>
            <h3 id="support-heading"></h3>
          </div>
          <div class="card-list" id="support-cards"></div>
        </article>
      </section>

      <section class="panel-block notes-block">
        <div class="panel-head">
          <p class="section-kicker" id="notes-kicker"></p>
          <h3 id="notes-heading"></h3>
        </div>
        <ul class="notes-list" id="notes-list"></ul>
      </section>
    </main>
  </div>

  <template id="card-row-template">
    <article class="card-row">
      <div class="card-row-main">
        <div>
          <p class="card-row-name"></p>
          <p class="card-row-text"></p>
        </div>
      </div>
      <div class="card-row-meta">
        <span class="card-pill card-cost"></span>
        <span class="card-pill card-count"></span>
        <span class="card-pill card-type"></span>
      </div>
    </article>
  </template>

  <script src="main.js"></script>
</body>
</html>
