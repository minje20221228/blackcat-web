name: Update Patch Notes

on:
  workflow_dispatch:
  schedule:
    - cron: '17 */6 * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Update Steam patch notes snapshot
        run: node scripts/update-patch-notes.js

      - name: Commit and push changes
        run: |
          if git diff --quiet -- patch-notes-data.js; then
            echo "No patch note changes detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add patch-notes-data.js
          git commit -m "chore: sync Steam patch notes"
          git push
